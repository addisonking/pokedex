name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Deploy
        env:
          HOMESERVER_IP: ${{ secrets.HOMESERVER_IP }}
        run: |
          tailscale ssh addis@$HOMESERVER_IP '~/pokedex/deploy.sh'
